PackageIdentifier: dagaza.Qube
PackageVersion: 1.0.0
PackageName: Qube
Publisher: dagaza
License: MIT
LicenseUrl: https://github.com/dagaza/Qube/blob/main/LICENSE
ShortDescription: Local hardware-accelerated AI desktop assistant
Description: >-
  Qube is a fully local, privacy-first, voice-to-voice AI desktop assistant.
  It integrates speech-to-text (faster-whisper), text-to-speech (Kokoro),
  retrieval-augmented generation (LanceDB + Nomic embeddings), and local LLM
  inference (llama.cpp) into a native PyQt6 desktop shell. Runs entirely
  offline under a strict memory budget.
PackageUrl: https://github.com/dagaza/Qube
Tags:
  - ai
  - assistant
  - local
  - privacy
  - voice
  - llm
  - desktop
InstallerType: inno
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/dagaza/Qube/releases/download/v1.0.0/Qube-1.0.0-Setup.exe
    InstallerSha256: <sha256>
    InstallerSwitches:
      Silent: /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
      SilentWithProgress: /SILENT /SUPPRESSMSGBOXES /NORESTART
